publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.0
  image_picker: ^1.0.0
  provider: ^6.0.0
  url_launcher: ^6.2.0
  flutter_tts: ^3.8.0
  permission_handler: ^11.0.0
  flutter_contacts: ^1.1.9
  mobile_scanner: ^5.2.0
  flutter_secure_storage: ^9.0.0
